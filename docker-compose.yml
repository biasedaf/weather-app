version: '3.8'

services:
  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: weather-backend:latest
    container_name: weather-backend
    restart: always
    env_file:
      - ./backend/.env
    networks:
      - weather-net
    # Ports are not strictly necessary to expose since frontend proxies internally,
    # but we map it if direct access is needed during development.
    ports:
      - "3000:3000"

  # Nginx Frontend & Reverse Proxy
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    image: weather-frontend:latest
    container_name: weather-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - weather-net

networks:
  weather-net:
    driver: bridge
